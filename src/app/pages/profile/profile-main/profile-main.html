<main class="profile-content">
  <div class="content-header">
    <div class="header-text">
      <h1>My Profile</h1>
      <p>Manage your personal information and preferences</p>
    </div>
    @if (hasChanges()) {
      <div class="unsaved-indicator">
        <span class="dot"></span>
        Unsaved changes
      </div>
    }
  </div>
  <div class="spin-container">
    <div class="spin-content">
      <form class="profile-form" [formGroup]="profileForm" (ngSubmit)="onSubmit()">

        <div class="form-card">
          <div class="card-header">
            <h3>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              Profile Picture
            </h3>
          </div>
          <div class="card-content">
            <div class="profile-picture-section">
              <div class="current-picture">
                <img alt="Profile picture" [src]="profileForm.get('pictureUrl')?.value || 'https://images.unsplash.com/photo-1778402620479-64bb441d5826?q=80&w=687&auto=format&fit=crop'">
                <div class="picture-overlay">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </div>
              </div>
              <div class="picture-actions">
                <div class="picture-info">
                  <h4>Upload your photo</h4>
                  <p>Enter a URL to your profile picture</p>
                </div>
                <div class="form-item">
                  <div class="input-wrapper">
                    <span class="input-icon-svg">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </span>
                    <input type="text" formControlName="pictureUrl" placeholder="https://example.com/avatar.jpg" class="form-input">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-card">
          <div class="card-header">
            <h3>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              Personal Information
            </h3>
          </div>
          <div class="card-content">
            <div class="form-grid">

              <div class="form-item">
                <label class="form-label required">First Name</label>
                <div class="input-wrapper">
                  <span class="input-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                  </span>
                  <input type="text" formControlName="firstName" placeholder="Enter your first name" class="form-input">
                </div>
              </div>

              <div class="form-item">
                <label class="form-label required">Last Name</label>
                <div class="input-wrapper">
                  <span class="input-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                  </span>
                  <input type="text" formControlName="lastName" placeholder="Enter your last name" class="form-input">
                </div>
              </div>

              <div class="form-item full-width">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                  <span class="input-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                  </span>
                  <input type="text" [value]="userService.user()?.email || ''" class="form-input readonly-input" readonly>
                  <span class="input-suffix locked-badge" title="Email cannot be changed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                  </span>
                </div>
              </div>

              <div class="form-item">
                <label class="form-label">Date of Birth</label>
                <div class="input-wrapper">
                  <span class="input-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                  </span>
                  <input type="date" formControlName="dateOfBirth" class="form-input">
                </div>
              </div>

              <div class="form-item">
                <label class="form-label">Phone Number</label>
                <div class="input-wrapper">
                  <span class="input-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                  </span>
                  <input type="text" formControlName="phoneNumber" placeholder="+995 555 123 456" class="form-input">
                </div>
              </div>

            </div>
          </div>
        </div>

        <div class="form-card">
          <div class="card-header">
            <h3>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              Address
            </h3>
          </div>
          <div class="card-content">
            <div class="form-item">
              <label class="form-label">Street Address</label>
              <div class="input-wrapper">
                <span class="input-icon-svg">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </span>
                <input type="text" formControlName="address" placeholder="Enter your street address" class="form-input">
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-discard" (click)="discardChanges()" [disabled]="!hasChanges()">
            <span class="btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </span>
            <span>Discard</span>
          </button>
          <button type="submit" class="btn-save" [disabled]="!hasChanges() || isLoading()">
            <span class="btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </span>
            <span>{{ isLoading() ? 'Saving...' : 'Save Changes' }}</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</main>
